# .github/workflows/generate-kql.yml
name: Generate KQL from JSON configs

on:
  push:
    paths:
      - 'configs/**.json'

permissions:
  contents: write

jobs:
  generate-kql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate KQL files
        run: bash scripts/generate_kql.sh

      - name: Commit and push KQL files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kql/
          git diff --cached --quiet || git commit -m "chore: auto-generate KQL from configs [skip ci]"
          git push