# .github/workflows/generate-dashboard.yml
name: Generate Grafana Dashboards

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - dev
          - sit
          - uat
          - prd
      file:
        description: |
          Config file to generate (without .json)
          - Leave blank = all files in selected env
          - Single file: project_a
          - Multiple files: project_a,project_b
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run (preview only, no files written)"
        required: false
        default: false
        type: boolean

  push:
    paths:
      - "configs/**/*.json"
      - "templates/template_dashboard.json"

permissions:
  contents: write

jobs:
  generate-dashboards:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Resolve run parameters ─────────────────────────────────────────────
      - name: Resolve run parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.env }}"
            FILE="${{ github.event.inputs.file }}"
            DRY="${{ github.event.inputs.dry_run }}"
          else
            # push trigger → regenerate all
            ENV="all"
            FILE=""
            DRY="false"
          fi

          # Normalise: blank/whitespace → "all"
          FILE=$(echo "$FILE" | tr -d ' ')
          [ -z "$FILE" ] && FILE="all"

          echo "env=$ENV"   >> $GITHUB_OUTPUT
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "dry=$DRY"   >> $GITHUB_OUTPUT

          echo "▶ env  = $ENV"
          echo "▶ file = $FILE"
          echo "▶ dry  = $DRY"

      # ── 4. Validate configs directory ────────────────────────────────────────
      - name: Validate configs directory
        run: |
          TARGET_ENV="${{ steps.params.outputs.env }}"
          ENVS=("dev" "sit" "uat" "prd")
          [ "$TARGET_ENV" = "all" ] && CHECK=("${ENVS[@]}") || CHECK=("$TARGET_ENV")

          HAS_ANY=false
          for E in "${CHECK[@]}"; do
            COUNT=$(find "configs/$E" -maxdepth 1 -name "*.json" 2>/dev/null | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "✅ configs/$E — $COUNT file(s)"
              HAS_ANY=true
            else
              echo "⚠️  configs/$E — no JSON files found"
            fi
          done

          if [ "$HAS_ANY" = "false" ]; then
            echo "❌ No config files found for env: $TARGET_ENV"
            exit 1
          fi

      # ── 5. Generate dashboards ────────────────────────────────────────────────
      - name: Generate dashboards
        env:
          AZURE_RESOURCE_DEV: ${{ secrets.AZURE_RESOURCE_DEV }}
          AZURE_RESOURCE_SIT: ${{ secrets.AZURE_RESOURCE_SIT }}
          AZURE_RESOURCE_UAT: ${{ secrets.AZURE_RESOURCE_UAT }}
          AZURE_RESOURCE_PRD: ${{ secrets.AZURE_RESOURCE_PRD }}
        run: |
          ENV="${{ steps.params.outputs.env }}"
          FILE="${{ steps.params.outputs.file }}"
          DRY="${{ steps.params.outputs.dry }}"

          ARGS="--env=${ENV} --file=${FILE}"
          [ "$DRY" = "true" ] && ARGS="$ARGS --dry-run"

          echo "Running: node scripts/generate-dashboards.js $ARGS"
          node scripts/generate-dashboards.js $ARGS

      # ── 6. List generated files ───────────────────────────────────────────────
      - name: List generated outputs
        if: ${{ steps.params.outputs.dry != 'true' }}
        run: |
          echo "=== Generated Dashboard Files ==="
          find output/ -name "*.json" -type f | sort | while read f; do
            TITLE=$(node -e "
              try { process.stdout.write(JSON.parse(require('fs').readFileSync('$f','utf8')).title || 'N/A'); }
              catch(e) { process.stdout.write('parse error'); }
            ")
            
            DASH_UID=$(node -e "
              try { process.stdout.write(JSON.parse(require('fs').readFileSync('$f','utf8')).uid || '-'); }
              catch(e) { process.stdout.write('-'); }
            ")
            
            echo "  $f  |  uid: $DASH_UID  |  $TITLE"
          done

      # ── 7. Commit and push ────────────────────────────────────────────────────
      - name: Commit and push generated dashboards
        if: ${{ steps.params.outputs.dry != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            FILE_LABEL="${{ steps.params.outputs.file }}"
            git commit -m "chore: generate dashboards [env=${{ steps.params.outputs.env }}] [file=${FILE_LABEL}] (${CHANGED} file(s)) [skip ci]"
            git push
            echo "✅ Pushed ${CHANGED} dashboard(s)"
          fi
